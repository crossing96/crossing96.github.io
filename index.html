<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>crossing96</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f7f8;
      --text: #1a1a1a;
      --muted: #5c5c5c;
      --link: #0969da;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --text: #e6edf3;
        --muted: #8b949e;
        --link: #58a6ff;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 2rem;
    }
    main {
      max-width: 36rem;
      width: 100%;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin: 0 0 0.5rem;
    }
    p { margin: 0 0 1rem; color: var(--muted); }
    ul {
      margin: 0;
      padding-left: 1.25rem;
    }
    li + li { margin-top: 0.5rem; }
    a { color: var(--link); }
  </style>
</head>
<body>
  <main>
    <h1>crossing96</h1>
    <p>Personal GitHub Pages. Project sites live on their own domains.</p>
    <ul>
      <li><a href="https://pubxel.org/">Pub-Xel</a> — biomedical research tools</li>
      <li><a href="https://github.com/crossing96/Pub-Xel">Pub-Xel App</a> on GitHub</li>
      <li><a href="https://github.com/crossing96">GitHub profile</a></li>
    </ul>
  </main>
</body>
</html>
