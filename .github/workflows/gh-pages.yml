name: GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # Personal landing page only — not the Pub-Xel site
  deploy-github-io:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Deploy to crossing96.github.io
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          publish_dir: ./github-io

  build-pubxel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'

      - name: Build
        run: hugo --minify

      - name: Upload site
        uses: actions/upload-artifact@v4
        with:
          name: public
          path: public

  deploy-pubxel-org:
    needs: build-pubxel
    runs-on: ubuntu-latest
    steps:
      - name: Download site
        uses: actions/download-artifact@v4
        with:
          name: public
          path: public

      - name: Add CNAME for pubxel.org
        run: echo "pubxel.org" > public/CNAME

      - name: Deploy to pubxelwebsite
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.GH_TOKEN }}
          publish_dir: ./public
          external_repository: crossing96/pubxelwebsite
